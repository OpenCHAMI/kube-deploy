apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# This resources list uses local paths for the repo to allow CI to test against the current
# version, rather than a specific tag. When you create your own local Kustomization, you should
# uncomment the URLs and remove the local paths. Replace "main" with a specific tag or commit.
resources:
#- https://github.com/OpenCHAMI/kube-deploy//kustomize/test-node/namespace/?timeoute=120&ref=main
#- https://github.com/OpenCHAMI/kube-deploy//kustomize/test-node/kubevirt/?timeoute=120&ref=main
#- https://github.com/OpenCHAMI/kube-deploy//kustomize/test-node/kubevirtbmc/?timeoute=120&ref=main
#- https://github.com/OpenCHAMI/kube-deploy//kustomize/test-node/vm/?timeoute=120&ref=main
- ../../kustomize/test-node/namespace/
- ../../kustomize/test-node/kubevirt/
- ../../kustomize/test-node/kubevirtbmc/
- ../../kustomize/test-node/vm/

# TODO installing cert-manager using Argo makes Argo unhappy with webhook certs.
# unknown issue prevents Argo from trusting cert-manager's. Pending a fix for that,
# it must be installed separately:
#
# kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.18.2/cert-manager.yaml

labels:
- includeSelectors: false
  pairs:
    app.kubernetes.io/part-of: virt-test

secretGenerator:
- name: vm-cloud-init
  namespace: default
  behavior: create
  files:
  - userdata

generatorOptions:
  disableNameSuffixHash: true

replacements:
  - source:
      kind: Secret
      name: vm-cloud-init
      version: v1
    targets:
      - select:
          kind: VirtualMachine
          group: kubevirt.io
          version: v1
          name: fred
        fieldPaths:
          - spec.template.spec.volumes.[name=cloudinitdisk].cloudInitNoCloud.secretRef.name
